# ============================================================
# Параметры стратегии скальпинг-бота
# Все значения соответствуют scalping-bot-spec.md
# Меняй здесь — код перечитает при следующем запуске
# ============================================================

# Торгуемые активы (спот, к USDT). Только long.
assets:
  - symbol: BTC-USDT
    # Минимальный размер тела свечи в % от цены (фильтр шума, MVP)
    min_body_pct: 0.10
  - symbol: ETH-USDT
    min_body_pct: 0.15
  - symbol: SOL-USDT
    min_body_pct: 0.25
  - symbol: BNB-USDT
    min_body_pct: 0.15

# ============================================================
# Капитал и объёмы
# ============================================================
capital:
  # Стартовый капитал в USDT (общий лимит экспозиции)
  total_usdt: 1000
  # Базовый объём одной покупки в USDT
  base_order_usdt: 20
  # Множители объёма по уровням сетки: [вход, ур.1, ур.2, ур.3]
  size_multipliers: [1.0, 1.0, 1.2, 1.5]
  # Полная глубина одной сетки = base * sum(multipliers) = 20 * 4.7 = 94 USDT

# ============================================================
# Сетка усреднения (DCA)
# ============================================================
grid:
  # На сколько % падает цена для срабатывания усреднения:
  # ур.1 — от цены входа, ур.2 — от цены ур.1, ур.3 — от цены ур.2
  dca_drop_pct: [2.0, 5.0, 8.0]
  # Максимум сеток одновременно на один актив
  max_grids_per_asset: 3

# ============================================================
# Take Profit (% от средней цены сетки по уровням 0..3)
# ============================================================
take_profit_pct: [1.5, 1.2, 1.0, 0.8]

# ============================================================
# Stop Loss (% от цены первого входа по уровням 0..3, 0 = без SL)
# ============================================================
stop_loss_pct: [0.0, 5.0, 12.0, 20.0]

# ============================================================
# Таймауты
# ============================================================
timeouts:
  # Сколько часов держим сетку перед закрытием по рынку (если в минусе)
  grid_max_hours: 96

# ============================================================
# Сигнал входа: все 3 свечи (15м, 30м, 60м) должны быть зелёными
# ============================================================
signal:
  # Таймфреймы для подтверждения зелёных свечей
  confirmation_timeframes: [15m, 30m, 60m]
  # Глобальный фильтр тренда: цена Daily > EMA(N) на торгуемом активе
  trend_filter:
    timeframe: 1D
    ema_period: 200
  # Фильтр шума: используем ATR или фиксированный % (см. assets[].min_body_pct)
  noise_filter:
    # Режим: fixed_pct (MVP) | atr (целевой)
    mode: fixed_pct
    atr_period: 14
    atr_body_threshold: 0.3   # body > 0.3 * ATR(14) — для режима atr

# ============================================================
# Риск-менеджмент
# ============================================================
risk:
  # Лимит дневного убытка от стартового баланса дня (UTC)
  daily_loss_limit_pct: 5.0
  # Таймзона для сброса дневного счётчика
  daily_reset_tz: UTC

# ============================================================
# Опрос рынка
# ============================================================
market_data:
  # Интервал опроса свечей (секунд)
  poll_interval_sec: 30
  # Сколько последних свечей кешировать в памяти
  candle_cache_size: 300

# ============================================================
# Хранилище
# ============================================================
storage:
  # Путь к файлу SQLite (относительно корня проекта)
  db_path: data/bot.sqlite3
